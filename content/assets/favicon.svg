<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb6c1" />
      <stop offset="50%" stop-color="#ff69b4" />
      <stop offset="100%" stop-color="#c71585" />
    </linearGradient>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff" />
      <stop offset="100%" stop-color="#e9d5ff" />
    </linearGradient>
  </defs>
  
  <!-- Portfolio Back Cover -->
  <path d="M 80 80 L 460 40 L 480 400 L 100 440 Z" fill="url(#folderGrad)" stroke="#4a044e" stroke-width="16" stroke-linejoin="round" />
  
  <!-- The Gemstone (Larger for favicon) -->
  <g transform="translate(256, 230) scale(1.4)">
    <polygon points="0,-100 80,-40 100,40 0,120 -100,40 -80,-40" fill="url(#gemGrad)" stroke="#4a044e" stroke-width="12" stroke-linejoin="round" />
    <polygon points="0,-50 40,-10 50,30 0,70 -50,30 -40,-10" fill="#ffb6c1" stroke="#4a044e" stroke-width="8" stroke-linejoin="round" />
    <polyline points="0,-100 0,-50" stroke="#4a044e" stroke-width="8" />
    <polyline points="80,-40 40,-10" stroke="#4a044e" stroke-width="8" />
    <polyline points="100,40 50,30" stroke="#4a044e" stroke-width="8" />
    <polyline points="0,120 0,70" stroke="#4a044e" stroke-width="8" />
    <polyline points="-100,40 -50,30" stroke="#4a044e" stroke-width="8" />
    <polyline points="-80,-40 -40,-10" stroke="#4a044e" stroke-width="8" />
    <polygon points="-30,-10 0,-30 20,-10 0,10" fill="#ffffff" opacity="0.9" />
  </g>

  <!-- Portfolio Front Cover (Opened) -->
  <path d="M 40 240 L 380 300 L 340 500 L 0 440 Z" fill="url(#folderGrad)" stroke="#4a044e" stroke-width="16" stroke-linejoin="round" />
  
  <!-- String Tie -->
  <circle cx="210" cy="270" r="20" fill="#fbcfe8" stroke="#4a044e" stroke-width="12" />

  <!-- Foreground Sparkle -->
  <path d="M 360 80 Q 370 130 420 140 Q 370 150 360 200 Q 350 150 300 140 Q 350 130 360 80" fill="#ffffff" stroke="#4a044e" stroke-width="8" />
</svg>
